<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <title>Todo App</title>
    <link href="https://fonts.googleapis.com/css?family=Lato:300,400,700" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <header class="header">
      <img class="header__img" src="./eisenhower-matrix.jpg">
        <a class="more-inf" href="https://goal-life.com/page/method/matrix-eisenhower">
          Want more details?
        </a>
    </header>
    <main class="main">
      <section id="add-new-task">
        <label class="add-new-task__label" for="new-task">Add Item</label>
          <div class="new-task-wrapper">
            <input id="new-task"class="task add-new-task__input item__task-input" type="text">
            <button class="btn">Add</button>
          </div>
      </section>
      <section class="todo">
        <h3 class="todo__title">Todo</h3>
        <ul class="todo__list" id="incomplete-tasks">
          <li class="list__item">
            <input class="item__check-box" type="checkbox">
            <label class="task item__label">Pay Bills</label>
            <input type="text" class="task item__task-input">
            <button class="btn edit-btn">Edit</button>
            <button class="btn delete-btn">
              <img class="btn__img" src="./remove.svg">
            </button>
          </li>
          <li class="list__item edit-mode">
            <input class="item__check-box" type="checkbox">
            <label class="task item__label">Go Shopping</label>
            <input type="text" value="Go Shopping" class="task item__task-input">
            <button class="btn edit-btn">Save</button>
            <button class="btn delete-btn">
              <img class="btn__img" src="./remove.svg">
            </button>
          </li>
        </ul>
      </section>
      <section class="complete"></section>
        <h3 class="todo__title">Completed</h3>
        <ul class="complete__list" id="complete-list">
          <li class="list__item">
            <input class="item__check-box" type="checkbox" checked>
            <label class="task item__label">See the Doctor</label>
            <input type="text" class="task item__task-input">
            <button class="btn edit-btn">Edit</button>
            <button class="btn delete-btn">
              <img class="btn__img" src="./remove.svg">
            </button>
          </li>
        </ul>
      </section>
    </main>
    <script src="app.js"></script>
  </body>
</html>
